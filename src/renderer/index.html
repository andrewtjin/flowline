<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowline</title>
    <!-- No-flash theme boot (E7-S5). This runs SYNCHRONOUSLY in <head>, BEFORE the deferred module script and
         before <body> paints, so a dark user never sees a white flash on reload. It reads the SAME persisted key
         the app uses ('flowline.theme', the single source of truth in settings-registry.ts) and sets
         documentElement.dataset.theme so the [data-theme="dark"] CSS block applies on first paint. A throwing
         read (privacy mode) or an empty value leaves the default (light). The app's loadPersistedTheme() re-runs
         the same resolution through the theme registry once the module loads — this is purely the early paint. -->
    <script>
      try {
        var t = localStorage.getItem("flowline.theme");
        if (t) document.documentElement.dataset.theme = t;
      } catch (e) {
        /* no persisted theme available (privacy mode / non-persistent partition) — default to light */
      }
    </script>
  </head>
  <body>
    <div id="fl-root" class="fl-shell">
      <header class="fl-topbar"><span class="fl-brand">Flowline</span></header>
      <!-- The topbar sits OVER a horizontal row. The sidebar (mounted by renderer/main.ts) is the
           left column; the editor surface + the bottom strip are the right column. .fl-shell stays a flex
           column; .fl-main-row is the flex row. #app and .fl-surface are UNCHANGED (centered editor). -->
      <div class="fl-main-row">
        <div class="fl-content-col">
          <main id="app" class="fl-surface"></main>
          <!-- The thin bottom strip with the sidebar-toggle button (a sibling of the surface, NOT inside it). -->
          <div class="fl-strip">
            <button type="button" class="fl-strip-toggle" id="fl-sidebar-toggle" aria-label="Toggle sidebar" title="Toggle sidebar">☰</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
